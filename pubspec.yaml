name: sqlite_manager
description: A cross-platform SQLite database management tool.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # SQLite core
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.0
  sqlcipher_flutter_libs: ^0.5.0

  # File operations
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # UI
  pluto_grid: ^8.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0

  # Utils
  uuid: ^4.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/
